services:
  postgres:
    image: postgres:16-alpine
    container_name: tictactoe_postgres
    environment:
      POSTGRES_DB: nakama
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: localdb
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-d", "nakama"]
      interval: 3s
      timeout: 3s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nakama_net

  nakama:
    image: registry.heroiclabs.com/heroiclabs/nakama:3.22.0
    container_name: tictactoe_nakama
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint:
      - "/bin/sh"
      - "-ecx"
      - >
        /nakama/nakama migrate up
        --database.address postgres:localdb@postgres:5432/nakama?sslmode=disable &&
        exec /nakama/nakama
        --config /nakama/data/local.yml
        --database.address postgres:localdb@postgres:5432/nakama?sslmode=disable
    ports:
      - "7349:7349"   # Socket.io port
      - "7350:7350"   # HTTP API + WebSocket
      - "7351:7351"   # Admin console
    healthcheck:
      test: ["CMD", "/nakama/nakama", "healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./backend:/nakama/data
    networks:
      - nakama_net
    restart: unless-stopped

networks:
  nakama_net:
    driver: bridge

volumes:
  postgres_data:
