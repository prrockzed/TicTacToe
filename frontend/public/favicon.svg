<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark background -->
  <rect width="32" height="32" rx="6" fill="#0a0a12"/>

  <!-- Grid lines -->
  <line x1="11" y1="4"  x2="11" y2="28" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="21" y1="4"  x2="21" y2="28" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="4"  y1="11" x2="28" y2="11" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="4"  y1="21" x2="28" y2="21" stroke="#6366f1" stroke-width="1.5" stroke-linecap="round"/>

  <!-- X in top-left cell -->
  <line x1="5.5" y1="5.5" x2="9.5" y2="9.5" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
  <line x1="9.5" y1="5.5" x2="5.5" y2="9.5" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>

  <!-- O in center cell -->
  <circle cx="16" cy="16" r="2.5" stroke="#f43f5e" stroke-width="2" fill="none"/>

  <!-- X in bottom-right cell -->
  <line x1="22.5" y1="22.5" x2="26.5" y2="26.5" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
  <line x1="26.5" y1="22.5" x2="22.5" y2="26.5" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
</svg>
